<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Realtime Transit Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        :root {
            --primary-color: #ff6600;
            --secondary-color: #0055ff;
            --text-color: #333;
            --bg-color: #ffffff;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: var(--text-color);
        }

        body {
            background: #f5f5f5;
        }

        #app {
            height: 100vh;
            width: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Legend Styling */
        .legend {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 999;
            background: var(--bg-color);
            padding: 16px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            font-size: 14px;
            font-weight: 500;
            min-width: 180px;
        }

        .legend-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-color);
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 8px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        /* Status Bar */
        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 999;
            background: var(--bg-color);
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            font-size: 12px;
            font-weight: 500;
            color: #666;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        .status-dot.loading {
            background: #ff9800;
        }

        .status-dot.error {
            background: #f44336;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* Leaflet Popup Customization */
        .leaflet-popup-content {
            font-size: 13px;
            line-height: 1.5;
        }

        .leaflet-popup-content b {
            color: var(--primary-color);
        }

        /* Popup Styling */
        .vehicle-popup {
            padding: 8px 0;
        }

        .vehicle-popup-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
        }

        .vehicle-popup-label {
            font-weight: 600;
            margin-right: 8px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="legend">
    <div class="legend-item">
        <div class="legend-color" style="background:#ff6600;"></div>
        OCTA
    </div>
    <div class="legend-item">
        <div class="legend-color" style="background:#0055ff;"></div>
        Irvine Shuttle
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="/public/scripts/gtfsmap.js" type="module"></script>


</body>
</html>
